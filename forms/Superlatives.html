<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Most Likely To — Oracle Edition</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --cream:   #FFF4E6;
    --paper:   #FFFBF2;
    --ink:     #0D0D0D;
    --ink-2:   #2A2A28;
    --muted:   #6E6A60;
    --line:    #1A1A1A;

    --pink:    #FF3D6E;
    --yellow:  #FFD60A;
    --cobalt:  #2348FF;
    --mint:    #00D68F;
    --coral:   #FF6B35;
    --lav:     #B47DFF;

    --display: 'Bricolage Grotesque', system-ui, sans-serif;
    --body:    'Plus Jakarta Sans', system-ui, sans-serif;
    --mono:    'JetBrains Mono', ui-monospace, monospace;

    --shadow-hard: 4px 4px 0 var(--ink);
    --shadow-deep: 8px 8px 0 var(--ink);
    --shadow-huge: 14px 14px 0 var(--ink);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--cream);
    color: var(--ink);
    font-family: var(--body);
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }
  body {
    min-height: 100vh;
    min-height: 100dvh;
    background-image:
      radial-gradient(circle at 12% 8%, rgba(255,61,110,0.10), transparent 32%),
      radial-gradient(circle at 88% 92%, rgba(35,72,255,0.10), transparent 35%),
      radial-gradient(circle at 78% 14%, rgba(255,214,10,0.14), transparent 30%);
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input { font-family: inherit; }

  /* ============= shared chrome ============= */
  .app-wrap {
    min-height: 100vh; min-height: 100dvh;
    display: flex; flex-direction: column;
  }
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 28px;
    border-bottom: 2px solid var(--ink);
  }
  .topbar .logo {
    font-family: var(--display);
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.02em;
  }
  .topbar .logo .dot { color: var(--pink); }
  .topbar .meta {
    font-family: var(--mono);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
  }

  /* ============= home ============= */
  .home {
    flex: 1;
    display: grid;
    place-items: center;
    padding: 40px 24px 80px;
  }
  .home-inner { width: min(1100px, 100%); }
  .eyebrow {
    font-family: var(--mono);
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
    margin-bottom: 18px;
    display: inline-flex; align-items: center; gap: 10px;
  }
  .eyebrow .pulse {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--pink);
    box-shadow: 0 0 0 4px rgba(255,61,110,0.18);
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse { 50% { box-shadow: 0 0 0 9px rgba(255,61,110,0); } }

  .megaword {
    font-family: var(--display);
    font-weight: 800;
    font-size: clamp(56px, 12vw, 168px);
    line-height: 0.86;
    letter-spacing: -0.045em;
    margin: 0;
  }
  .megaword .row { display: block; }
  .megaword .strike { text-decoration: line-through; text-decoration-thickness: 8px; color: var(--ink); text-decoration-color: var(--pink); }
  .megaword .swatch {
    display: inline-block;
    padding: 0 0.18em 0.06em;
    line-height: 0.95;
    transform: rotate(-2.2deg);
  }
  .swatch-pink   { background: var(--pink);   color: #fff; }
  .swatch-yellow { background: var(--yellow); color: var(--ink); }
  .swatch-cobalt { background: var(--cobalt); color: #fff; }
  .swatch-mint   { background: var(--mint);   color: var(--ink); }
  .swatch-lav    { background: var(--lav);    color: var(--ink); }

  .home-grid {
    margin-top: 56px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
  }
  @media (max-width: 760px) {
    .home-grid { grid-template-columns: 1fr; }
  }
  .card {
    background: var(--paper);
    border: 2.5px solid var(--ink);
    border-radius: 22px;
    padding: 28px;
    box-shadow: var(--shadow-deep);
  }
  .card h3 {
    margin: 0 0 8px;
    font-family: var(--display);
    font-weight: 800;
    font-size: 32px;
    letter-spacing: -0.02em;
  }
  .card p {
    margin: 0 0 24px;
    color: var(--ink-2);
    font-size: 16px;
    line-height: 1.5;
  }
  .big-btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 18px 22px;
    border: 2.5px solid var(--ink);
    border-radius: 14px;
    font-family: var(--display);
    font-weight: 700;
    font-size: 22px;
    letter-spacing: -0.01em;
    box-shadow: var(--shadow-hard);
    transition: transform 0.08s ease, box-shadow 0.08s ease;
  }
  .big-btn:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--ink); }
  .big-btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--ink); }
  .big-btn.pink   { background: var(--pink);   color: #fff; }
  .big-btn.cobalt { background: var(--cobalt); color: #fff; }
  .big-btn.yellow { background: var(--yellow); color: var(--ink); }
  .big-btn.ink    { background: var(--ink);    color: var(--cream); }
  .big-btn.ghost  { background: var(--paper);  color: var(--ink); }
  .big-btn[disabled] { opacity: 0.5; cursor: not-allowed; }
  .big-btn[disabled]:hover { transform: none; box-shadow: var(--shadow-hard); }

  .home-foot {
    margin-top: 48px;
    display: flex;
    flex-wrap: wrap;
    gap: 16px 28px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
  }
  .home-foot span b { color: var(--ink); }

  .roster {
    margin-top: 36px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  .pill {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 14px;
    border-radius: 999px;
    border: 2px solid var(--ink);
    background: var(--paper);
    font-weight: 700;
    font-size: 14px;
  }
  .pill .swatch-dot {
    width: 10px; height: 10px; border-radius: 50%;
    border: 1.5px solid var(--ink);
  }

  /* ============= host: lobby / question / reveal / recap ============= */
  .host { flex: 1; display: flex; flex-direction: column; padding: 28px clamp(20px, 4vw, 56px) 40px; }
  .lobby {
    display: grid; grid-template-columns: 1.1fr 1fr; gap: 36px;
    flex: 1;
  }
  @media (max-width: 1000px) {
    .lobby { grid-template-columns: 1fr; }
  }
  .code-block {
    background: var(--ink);
    color: var(--cream);
    border-radius: 24px;
    padding: 32px;
    position: relative;
    overflow: hidden;
  }
  .code-block .label {
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,244,230,0.55);
  }
  .code-display {
    font-family: var(--display);
    font-weight: 800;
    font-size: clamp(72px, 14vw, 200px);
    line-height: 0.95;
    letter-spacing: -0.04em;
    color: var(--yellow);
    margin: 18px 0 8px;
    word-break: break-all;
  }
  .code-url {
    font-family: var(--mono);
    font-size: 14px;
    color: rgba(255,244,230,0.7);
    word-break: break-all;
  }
  .qr-card {
    background: var(--paper);
    border: 2.5px solid var(--ink);
    border-radius: 24px;
    padding: 22px;
    display: grid; place-items: center;
    box-shadow: var(--shadow-deep);
  }
  .qr-card img {
    display: block; width: 100%; height: auto;
    border: 2.5px solid var(--ink);
    border-radius: 12px;
    background: #fff;
  }
  .qr-card .qr-cap {
    margin-top: 14px;
    text-align: center;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .lobby-side { display: flex; flex-direction: column; gap: 22px; }
  .joined-card {
    background: var(--paper);
    border: 2.5px solid var(--ink);
    border-radius: 24px;
    padding: 22px;
    box-shadow: var(--shadow-deep);
  }
  .joined-card h4 {
    margin: 0 0 14px;
    font-family: var(--display);
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.01em;
    display: flex; align-items: center; justify-content: space-between;
  }
  .joined-card h4 .count {
    font-family: var(--mono);
    font-size: 14px;
    background: var(--ink); color: var(--cream);
    padding: 4px 10px; border-radius: 999px;
  }
  .joined-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 10px;
  }
  .joined-chip {
    padding: 12px 10px;
    border: 2px solid var(--ink);
    border-radius: 12px;
    background: var(--cream);
    font-weight: 700;
    text-align: center;
    font-size: 15px;
    position: relative;
  }
  .joined-chip.in {
    transform: rotate(-1deg);
    animation: pop 0.4s cubic-bezier(.5,1.6,.5,1);
  }
  .joined-chip.in.alt { transform: rotate(1.2deg); }
  .joined-chip.out { opacity: 0.35; }
  .joined-chip .dot {
    position: absolute; top: 8px; right: 8px;
    width: 10px; height: 10px; border-radius: 50%;
    border: 1.5px solid var(--ink);
    background: var(--muted);
  }
  .joined-chip.in .dot { background: var(--mint); }
  @keyframes pop {
    0% { transform: scale(0.6) rotate(-6deg); }
    60% { transform: scale(1.12) rotate(-1deg); }
    100% { transform: scale(1) rotate(-1deg); }
  }

  .host-foot {
    margin-top: 22px;
    display: flex; gap: 14px; align-items: center; justify-content: space-between;
    flex-wrap: wrap;
  }

  /* QUESTION SCREEN ============================ */
  .qstage {
    flex: 1;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 24px;
  }
  .q-head {
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 12px;
  }
  .q-counter {
    font-family: var(--mono);
    font-size: 14px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .q-counter b { color: var(--ink); font-size: 18px; }
  .q-progress {
    flex: 1;
    height: 14px;
    margin: 0 22px;
    border: 2px solid var(--ink);
    border-radius: 999px;
    background: var(--paper);
    overflow: hidden;
    min-width: 200px;
  }
  .q-progress > div {
    height: 100%;
    background: linear-gradient(90deg, var(--pink), var(--cobalt));
    transition: width 0.5s ease;
  }
  .q-body {
    display: grid;
    grid-template-columns: 1.05fr 0.95fr;
    gap: 28px;
    align-items: stretch;
  }
  @media (max-width: 1000px) {
    .q-body { grid-template-columns: 1fr; }
  }
  .q-prompt {
    background: var(--paper);
    border: 2.5px solid var(--ink);
    border-radius: 28px;
    padding: clamp(28px, 4vw, 56px);
    box-shadow: var(--shadow-huge);
    display: flex; flex-direction: column; justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .q-prompt .q-eyebrow {
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0 0 18px;
  }
  .q-prompt .body {
    font-family: var(--display);
    font-weight: 800;
    font-size: clamp(40px, 6.2vw, 92px);
    line-height: 0.96;
    letter-spacing: -0.035em;
    text-wrap: pretty;
    margin: 0;
  }
  .q-prompt .corner-num {
    position: absolute;
    bottom: 18px; right: 28px;
    font-family: var(--mono);
    font-weight: 700;
    font-size: 18px;
    color: var(--muted);
  }
  .live-card {
    background: var(--ink);
    color: var(--cream);
    border-radius: 28px;
    padding: 24px;
    box-shadow: var(--shadow-huge);
    display: flex; flex-direction: column; gap: 16px;
  }
  .live-card h5 {
    margin: 0;
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,244,230,0.6);
    display: flex; justify-content: space-between; align-items: center;
  }
  .live-card h5 .live-dot {
    display: inline-flex; align-items: center; gap: 8px;
  }
  .live-card h5 .live-dot::before {
    content: ''; width: 9px; height: 9px; border-radius: 50%;
    background: var(--mint);
    box-shadow: 0 0 0 4px rgba(0,214,143,0.25);
    animation: pulse 1.4s ease-in-out infinite;
  }
  .vote-progress {
    font-family: var(--display);
    font-weight: 800;
    font-size: 64px;
    line-height: 1;
    letter-spacing: -0.03em;
  }
  .vote-progress span { color: rgba(255,244,230,0.45); font-size: 36px; }
  .live-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 8px;
  }
  .live-chip {
    padding: 10px;
    border-radius: 10px;
    border: 1.5px solid rgba(255,244,230,0.2);
    font-size: 13px;
    font-weight: 700;
    background: rgba(255,255,255,0.04);
    text-align: center;
    transition: all 0.2s;
  }
  .live-chip.voted {
    background: var(--mint);
    color: var(--ink);
    border-color: var(--mint);
  }
  .live-chip.voted::before { content: '✓ '; }
  .live-chip.not-joined { opacity: 0.3; }

  /* REVEAL ============================ */
  .reveal-stage {
    flex: 1;
    display: grid;
    grid-template-rows: auto 1fr;
    gap: 22px;
  }
  .reveal-banner {
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; flex-wrap: wrap;
  }
  .reveal-title {
    font-family: var(--display);
    font-weight: 800;
    font-size: clamp(32px, 4.5vw, 60px);
    letter-spacing: -0.025em;
    line-height: 0.95;
    margin: 0;
    flex: 1;
    min-width: 280px;
  }
  .reveal-question {
    font-family: var(--display);
    font-size: clamp(24px, 3vw, 38px);
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -0.015em;
    color: var(--ink-2);
    margin: 0 0 24px;
    text-wrap: pretty;
  }
  .winner-row {
    display: grid; grid-template-columns: minmax(280px, 1fr) 1.4fr;
    gap: 28px; align-items: stretch;
  }
  @media (max-width: 1000px) {
    .winner-row { grid-template-columns: 1fr; }
  }
  .winner-card {
    border: 3px solid var(--ink);
    border-radius: 28px;
    padding: 32px;
    box-shadow: var(--shadow-huge);
    display: flex; flex-direction: column; justify-content: center;
    position: relative; overflow: hidden;
    animation: winner-in 0.6s cubic-bezier(.3,1.6,.4,1) both;
  }
  @keyframes winner-in {
    0% { transform: scale(0.7) rotate(-4deg); opacity: 0; }
    100% { transform: scale(1) rotate(-1.5deg); opacity: 1; }
  }
  .winner-card .crown {
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    opacity: 0.7;
  }
  .winner-card .name {
    font-family: var(--display);
    font-weight: 800;
    font-size: clamp(72px, 12vw, 160px);
    line-height: 0.86;
    letter-spacing: -0.05em;
    margin: 6px 0 8px;
  }
  .winner-card .votes {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 700;
    opacity: 0.8;
  }
  .winner-card .tie-badge {
    display: inline-block;
    background: var(--ink); color: var(--cream);
    padding: 4px 12px; border-radius: 999px;
    font-family: var(--mono); font-size: 12px;
    letter-spacing: 0.18em;
    margin-bottom: 12px;
    align-self: flex-start;
  }
  .tally {
    background: var(--paper);
    border: 2.5px solid var(--ink);
    border-radius: 28px;
    padding: 22px 26px;
    box-shadow: var(--shadow-deep);
    display: flex; flex-direction: column; gap: 10px;
    overflow-y: auto;
  }
  .tally h5 {
    margin: 0 0 4px;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .bar-row {
    display: grid;
    grid-template-columns: 110px 1fr 44px;
    gap: 12px;
    align-items: center;
  }
  .bar-row .nm { font-weight: 800; font-size: 16px; }
  .bar-track {
    height: 22px;
    background: rgba(13,13,13,0.06);
    border: 2px solid var(--ink);
    border-radius: 999px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-right: 2px solid var(--ink);
    transition: width 0.8s cubic-bezier(.2,.8,.2,1);
  }
  .bar-row .vc {
    font-family: var(--mono);
    font-weight: 700;
    text-align: right;
    font-size: 15px;
  }
  .bar-row.zero .bar-fill { display: none; }
  .bar-row.zero .nm { opacity: 0.45; }
  .bar-row.zero .vc { opacity: 0.45; }

  /* recap ====================== */
  .recap {
    flex: 1;
    padding: 0;
  }
  .recap-head {
    text-align: center;
    margin-bottom: 32px;
  }
  .recap-head .eyebrow { justify-content: center; }
  .recap-head h1 {
    font-family: var(--display);
    font-weight: 800;
    font-size: clamp(48px, 9vw, 120px);
    line-height: 0.88;
    letter-spacing: -0.045em;
    margin: 8px 0 12px;
  }
  .recap-head p {
    font-size: 18px;
    color: var(--ink-2);
    max-width: 640px;
    margin: 0 auto;
  }
  .recap-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 18px;
    margin-top: 32px;
  }
  .recap-card {
    border: 2.5px solid var(--ink);
    border-radius: 18px;
    padding: 20px;
    background: var(--paper);
    box-shadow: var(--shadow-hard);
    display: flex; flex-direction: column;
    min-height: 200px;
  }
  .recap-card .qnum {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.18em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .recap-card .qtext {
    font-family: var(--display);
    font-weight: 700;
    font-size: 18px;
    line-height: 1.2;
    letter-spacing: -0.01em;
    margin: 6px 0 12px;
    text-wrap: pretty;
  }
  .recap-card .winner-pill {
    align-self: flex-start;
    padding: 8px 14px;
    border-radius: 999px;
    border: 2px solid var(--ink);
    font-weight: 800;
    font-size: 16px;
    margin-top: auto;
  }
  .recap-card .winner-pill.tie { background: var(--ink); color: var(--cream); }
  .recap-card .sub {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
  }

  /* PLAYER VIEW (mobile) ============================ */
  .player {
    flex: 1;
    display: flex; flex-direction: column;
    padding: 20px 18px 28px;
    max-width: 640px; width: 100%;
    margin: 0 auto;
  }
  .player .ptopbar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 24px;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .player .ptopbar .me {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 4px 10px;
    border: 2px solid var(--ink);
    border-radius: 999px;
    color: var(--ink);
    background: var(--paper);
    font-weight: 700;
    font-size: 12px;
  }
  .player .ptopbar .me .dot {
    width: 8px; height: 8px; border-radius: 50%;
    border: 1.5px solid var(--ink);
  }
  .player h2.q-prompt-mobile {
    font-family: var(--display);
    font-weight: 800;
    font-size: clamp(28px, 8vw, 44px);
    line-height: 1.05;
    letter-spacing: -0.025em;
    margin: 0 0 6px;
  }
  .player .qmeta {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 18px;
  }
  .vote-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 8px;
  }
  .vote-btn {
    padding: 22px 14px;
    border-radius: 16px;
    border: 2.5px solid var(--ink);
    background: var(--paper);
    font-family: var(--display);
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.01em;
    text-align: left;
    box-shadow: 3px 3px 0 var(--ink);
    transition: transform 0.08s ease, box-shadow 0.08s ease;
    position: relative;
    min-height: 80px;
    display: flex; align-items: center; gap: 10px;
  }
  .vote-btn:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 var(--ink); }
  .vote-btn .swatch-dot {
    width: 14px; height: 14px; border-radius: 50%;
    border: 1.5px solid var(--ink);
    flex-shrink: 0;
  }
  .vote-btn.picked {
    box-shadow: 5px 5px 0 var(--ink);
    transform: translate(-2px, -2px);
  }
  .vote-btn[disabled] { opacity: 0.45; }
  .vote-btn[disabled]:active { transform: none; }

  .submit-cta {
    margin-top: 22px;
  }
  .voted-badge {
    margin-top: 18px;
    text-align: center;
    padding: 22px;
    border: 2.5px dashed var(--ink);
    border-radius: 18px;
    background: var(--paper);
  }
  .voted-badge h3 {
    font-family: var(--display);
    font-weight: 800;
    font-size: 26px;
    margin: 0 0 4px;
    letter-spacing: -0.02em;
  }
  .voted-badge p {
    margin: 0;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
  }

  .identity-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 10px;
  }
  .id-btn {
    padding: 18px 12px;
    border-radius: 14px;
    border: 2.5px solid var(--ink);
    background: var(--paper);
    font-family: var(--display);
    font-weight: 800;
    font-size: 20px;
    letter-spacing: -0.01em;
    text-align: left;
    box-shadow: 3px 3px 0 var(--ink);
    transition: transform 0.08s ease, box-shadow 0.08s ease;
    display: flex; align-items: center; gap: 10px;
  }
  .id-btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--ink); }
  .id-btn[disabled] { opacity: 0.35; cursor: not-allowed; }
  .id-btn .swatch-dot {
    width: 12px; height: 12px; border-radius: 50%;
    border: 1.5px solid var(--ink);
  }

  .code-input {
    width: 100%;
    padding: 24px 18px;
    border: 2.5px solid var(--ink);
    border-radius: 18px;
    background: var(--paper);
    font-family: var(--display);
    font-weight: 800;
    font-size: 48px;
    letter-spacing: 0.18em;
    text-align: center;
    text-transform: uppercase;
    box-shadow: var(--shadow-hard);
    color: var(--ink);
  }
  .code-input:focus { outline: 4px solid var(--yellow); outline-offset: 2px; }

  .toast {
    background: var(--ink);
    color: var(--cream);
    padding: 10px 14px;
    border-radius: 12px;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .toast.error { background: #B30030; }
  .toast.warn  { background: var(--coral); }
  .toast.ok    { background: var(--mint); color: var(--ink); }

  /* generic ====================== */
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .spacer { flex: 1; }
  .stack { display: flex; flex-direction: column; gap: 12px; }
  .center { text-align: center; }
  .hidden { display: none !important; }

  /* confetti pixel layer */
  .confetti {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 9999;
  }

  /* link-style minor button */
  .link-btn {
    text-decoration: underline;
    text-decoration-thickness: 2px;
    text-underline-offset: 4px;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-2);
  }
  .link-btn:hover { color: var(--pink); }

  /* connection banner */
  .conn-banner {
    margin: 0 0 20px;
    padding: 12px 16px;
    border: 2px solid var(--ink);
    border-radius: 12px;
    background: var(--paper);
    display: flex; align-items: center; gap: 10px;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .conn-banner .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--muted);
  }
  .conn-banner.ok .dot { background: var(--mint); box-shadow: 0 0 0 4px rgba(0,214,143,0.2); }
  .conn-banner.warn .dot { background: var(--coral); animation: pulse 1.4s infinite; }
  .conn-banner.err  { background: #FDE2E2; }
  .conn-banner.err .dot { background: #B30030; }

</style>
</head>
